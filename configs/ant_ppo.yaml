# Ant — high-dimensional locomotion, the hardest environment here
env_name:         Ant
total_timesteps:  3_000_000
seed:             42
eval_episodes:    10
eval_interval:    100_000
save_interval:    500_000
log_dir:          logs

ppo:
  actor_hidden:     [256, 256]
  critic_hidden:    [256, 256]
  n_steps:          2048
  n_epochs:         10
  mini_batch_size:  256        # larger batch helps with high obs dim
  clip_eps:         0.2
  vf_coef:          0.5
  ent_coef:         0.0
  max_grad_norm:    0.5
  gamma:            0.99
  gae_lambda:       0.95
  lr:               3.0e-4
  lr_anneal:        true
  normalize_obs:    true
  normalize_rewards: true
