# Reacher — continuous manipulation task, benefits from more exploration
env_name:         Reacher
total_timesteps:  500_000
seed:             42
eval_episodes:    20
eval_interval:    50_000
save_interval:    100_000
log_dir:          logs

ppo:
  actor_hidden:     [256, 256]
  critic_hidden:    [256, 256]
  n_steps:          2048
  n_epochs:         10
  mini_batch_size:  64
  clip_eps:         0.2
  vf_coef:          0.5
  ent_coef:         0.005
  max_grad_norm:    0.5
  gamma:            0.99
  gae_lambda:       0.95
  lr:               3.0e-4
  lr_anneal:        true
  normalize_obs:    true
  normalize_rewards: false
