name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libosmesa6 libglfw3 patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run environment smoke tests
        run: python -m pytest tests/test_envs.py -v --tb=short -x

      - name: Run agent unit tests
        run: python -m pytest tests/test_agents.py -v --tb=short -x

      - name: Run SAC / TD3 tests
        run: python -m pytest tests/test_sac_td3.py -v --tb=short -x

      - name: Run wrapper tests
        run: python -m pytest tests/test_wrappers.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --select E,F,W --ignore E501,F401

  type-check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: mypy
        run: mypy agents/ envs/ training/ utils/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # treat as advisory for now
